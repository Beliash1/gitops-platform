apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-platform
  template:
    metadata:
      labels:
        app: gitops-platform
    spec:
      containers:
      - name: gitops-platform
        image: gitops-platform:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 5000

