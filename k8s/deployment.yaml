apiVersion: apps/v1
kind: Deployment
metadata:
  name: gitops-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gitops-platform
  template:
    metadata:
      labels:
        app: gitops-platform
    spec:
      containers:
      - name: gitops-platform
        imagePullPolicy: Always
        image: beliash1/gitops-platform:latest
        ports:
        - containerPort: 5000

        livenessProbe:
          httpGet:
            path: /health
            port: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
